version: "3.8"

services:
  api:
    build: .
    container_name: cybersec-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    command: python3 api.py

  dashboard:
    build: .
    container_name: cybersec-dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      - api
    restart: unless-stopped
    command: streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0